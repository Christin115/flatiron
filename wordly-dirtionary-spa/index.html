<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly Dictionary</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">

    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="search-form">

      <input
        type="text"
        id="word-input"
        placeholder="Search for a word..."
        aria-label="Search for a word"
      />

      <button type="submit">Search</button>

    </form>

    <!-- Error Message -->
    <p id="error-message"></p>

    <!-- Results Section -->
    <section id="results">

      <h2 id="word-title"></h2>

      <p id="pronunciation"></p>

      <p id="part-of-speech"></p>

      <p id="definition"></p>

      <p id="example"></p>

      <p id="synonyms"></p>

      <div id="audio-container"></div>

    </section>

  </main>

  <script src="index.js"></script>

</body>
</html>
